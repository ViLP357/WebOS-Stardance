<!DOCTYPE html>
<html>

  <body style="background-image: url(./images/capybara-wallpaper.jpg); background-size: cover; height: 100vh; background-color:#c8f7f4; 
    font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;margin: 0;">
    <script>
      
      function updateTime() {
        const d = new Date()
        document.querySelector('#dateText').innerHTML = d.toLocaleDateString()

        let minutes = d.getMinutes();
        let hours = d.getHours();
        let seconds = d.getSeconds();
        document.querySelector('#dateText').innerHTML += " " + hours + ":"+ minutes + ":" +seconds

      }
      setInterval(updateTime, 1000)
    </script>

  <div
    style="position: absolute; width: 99%; display: flex; backdrop-filter: blur(10px); background-color: rgba(20, 0, 0, 0.25); 
    color: #fff; justify-content: space-evenly; border-radius: 0px 0px 40px 40px; height: 45px;left: 50%; transform: translate(-50%);
    border: 1px solid #cacaca; border-top: transparent;">
    <p style="margin-left: 16px;">
      CapyOs
    </p>
    <p id="dateText" style="size: fit-content; margin-right: 16px; background-color: rgba(256, 256, 256, 0.125); 
      padding: 10px 10px; border-radius: 16px; margin: 5px;;">
      00:00:00
    </p>
  </div>

  </body>
</html>
